name: Deploy FastAPI

on:
  push:
    branches:
      - main

concurrency:
  group: production-deployment
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 10m
          script: |
            set -e

            cd /var/www/api.qmaster

            git fetch origin main
            git reset --hard origin/main

            /root/.local/bin/uv sync --frozen

            systemctl restart qmaster-api.service
            systemctl is-active --quiet qmaster-api.service

            echo "Deployment completed"

      - name: Telegram success notification
        if: success()
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="✅ QMaster API deployment successful

Repository: ${{ github.repository }}
Branch: ${{ github.ref_name }}
By: ${{ github.actor }}
Commit: ${{ github.event.head_commit.message }}

Workflow:
https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Telegram failure notification
        if: failure()
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="❌ QMaster API deployment failed

Repository: ${{ github.repository }}
Branch: ${{ github.ref_name }}
By: ${{ github.actor }}

Workflow:
https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"